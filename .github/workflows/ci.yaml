on
  push:
    branches:
        - main
jobs:
    build: ci
    runs-on: ubuntu-latest
    steps:
        - name: checkout code
          uses: actions/checkout@v2
        - name: set up node
          uses: actions/setup-node@v2
          with:
            node-version: "18"
        - name: install dependencies
          run: npm install
        - name: run tests
          run: npm test 
        - name: npm build
          run: npm run build  
          
          